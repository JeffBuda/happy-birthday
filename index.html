<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 21st Birthday Esa!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #87CEEB; /* Sky blue background */
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .greeting-container {
            z-index: 10;
            text-align: center;
            padding: 20px;
            pointer-events: none; 
        }

        .greeting {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            /* MSU Green and White text effect */
            background: linear-gradient(to right, #18453B, #ffffff, #18453B, #ffffff, #18453B);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: pulse 2s infinite;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #score-display {
            position: absolute;
            bottom: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #18453B; /* MSU Green */
            background-color: rgba(255, 255, 255, 0.8);
            padding: 8px 20px;
            border-radius: 25px;
            z-index: 20;
            user-select: none;
            pointer-events: none; /* Prevents the score box from blocking emoji taps */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .emoji {
            position: absolute;
            top: 0; 
            user-select: none;
            cursor: pointer; 
            animation: floatUp linear forwards;
            -webkit-tap-highlight-color: transparent; 
        }

        @keyframes floatUp {
            0% { 
                transform: translateY(110vh) rotate(0deg); 
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% { 
                transform: translateY(-10vh) rotate(360deg); 
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .greeting { 
                font-size: 2.8rem; 
            }
        }
    </style>
</head>
<body>

    <div class="greeting-container">
        <h1 class="greeting">Happy 21st<br>Birthday Esa!</h1>
    </div>

    <!-- New Score Element -->
    <div id="score-display">Score: 0</div>

    <script>
        // Track the user's score globally
        let score = 0;
        const scoreDisplay = document.getElementById('score-display');

        function spawnEmoji(isInitial = false) {
            const emojis = ['🦒', '🌈', '🥂', '🍾', '🍻', '🍹', '🍸', '🍷', '🕹️', '🎮', '🎧', '👾', '🖱️'];
            const emojiEl = document.createElement('div');
            
            emojiEl.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emojiEl.className = 'emoji';

            const startPosX = Math.random() * window.innerWidth;
            const duration = Math.random() * 4 + 4; 
            const size = Math.random() * 2 + 1.5; 

            emojiEl.style.left = startPosX + 'px';
            emojiEl.style.animationDuration = duration + 's';
            emojiEl.style.fontSize = size + 'rem';

            if (isInitial) {
                emojiEl.style.animationDelay = `-${Math.random() * duration}s`;
            }

            // Increase score when an emoji is successfully tapped
            emojiEl.onpointerdown = function(e) {
                e.preventDefault(); 
                score++; // Increment score
                scoreDisplay.innerText = `Score: ${score}`; // Update the text on screen
                this.remove();
            };

            document.body.appendChild(emojiEl);

            setTimeout(() => {
                if (document.body.contains(emojiEl)) {
                    emojiEl.remove();
                }
            }, duration * 1000);
        }

        for (let i = 0; i < 45; i++) {
            spawnEmoji(true);
        }

        setInterval(() => spawnEmoji(false), 133);
    </script>
</body>
</html>
