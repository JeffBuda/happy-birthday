<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 21st Birthday Esa!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #87CEEB; /* Sky blue background */
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .greeting-container {
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .greeting {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            /* MSU Green and White text effect */
            background: #18453B;
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: pulse 2s infinite;
            /* Darkened the shadow slightly so the white stands out against the blue */
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .emoji {
            position: absolute;
            top: 0; 
            user-select: none;
            pointer-events: none;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            0% { 
                transform: translateY(110vh) rotate(0deg); 
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% { 
                transform: translateY(-10vh) rotate(360deg); 
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .greeting { 
                font-size: 2.8rem; 
            }
        }
    </style>
</head>
<body>

    <div class="greeting-container">
        <h1 class="greeting">Happy 21st<br>Birthday Esa!</h1>
    </div>

    <script>
        function spawnEmoji(isInitial = false) {
            // Added gaming emojis to the mix
            const emojis = ['🦒', '🌈', '🥂', '🍾', '🍻', '🍹', '🍸', '🍷', '🕹️', '🎮', '🎧'];
            const emojiEl = document.createElement('div');
            
            emojiEl.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emojiEl.className = 'emoji';

            const startPosX = Math.random() * window.innerWidth;
            const duration = Math.random() * 4 + 4; 
            const size = Math.random() * 2 + 1.5; 

            emojiEl.style.left = startPosX + 'px';
            emojiEl.style.animationDuration = duration + 's';
            emojiEl.style.fontSize = size + 'rem';

            if (isInitial) {
                emojiEl.style.animationDelay = `-${Math.random() * duration}s`;
            }

            document.body.appendChild(emojiEl);

            setTimeout(() => {
                emojiEl.remove();
            }, duration * 1000);
        }

        for (let i = 0; i < 45; i++) {
            spawnEmoji(true);
        }

        setInterval(() => spawnEmoji(false), 133);
    </script>
</body>
</html>
